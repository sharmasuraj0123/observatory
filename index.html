<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Observatory · Real-Ephemeris Solar System</title>
  <link rel="icon" type="image/svg+xml" href="/xo-logo.svg" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app"></div>

  <div id="loading">
    <div class="load-inner">
      <img class="load-logo" src="/xo-logo.svg" alt="XO" />
      <h1>OBSERVATORY</h1>
      <p class="load-sub">Computing planetary ephemerides…</p>
      <div class="load-bar"><div id="load-fill"></div></div>
    </div>
  </div>

  <header id="topbar">
    <div class="brand">
      <img class="brand-mark" src="/xo-logo.svg" alt="XO" />
      <span class="brand-name">Observatory</span>
      <div class="seg tabs" id="tab-switch">
        <a href="/spm" id="tab-spm" class="active">SPM mooring</a>
        <a href="/" id="tab-solar">Solar system</a>
        <a href="/equation" id="tab-math" class="desktop-only">Equation lab</a>
        <a href="/earth" id="tab-earth" class="desktop-only">Earth lab</a>
        <a href="/light" id="tab-light" class="desktop-only">Light lab</a>
        <a href="/gravity" id="tab-gravity" class="desktop-only">Gravity lab</a>
        <a href="/photo" id="tab-photo" class="desktop-only">Photo lab</a>
        <a href="/fractals" id="tab-fractal" class="desktop-only">Fractals lab</a>
      </div>
    </div>
    <div id="sim-date">
      <span id="date-text"></span>
      <span id="live-badge" class="live-badge">● LIVE</span>
      <span id="exp-badge" class="live-badge exp">⚗ EXPERIMENT</span>
      <span id="rec-badge" class="live-badge rec">● REC</span>
    </div>
    <div class="top-actions">
      <button id="btn-bodies" class="tbtn mobile-only" title="Bodies" aria-label="Bodies">◎</button>
      <button id="btn-snap" class="tbtn desktop-only" title="Snapshot (S)">📷</button>
      <button id="btn-record" class="tbtn desktop-only" title="Record trace video with XO HUD + data, max 10s (V)" aria-pressed="false">⏺</button>
      <button id="btn-help" class="tbtn" title="Help (H)">?</button>
      <button id="btn-lab" class="tbtn desktop-only" title="Physics lab (E)">⚗</button>
      <button id="btn-settings" class="tbtn" title="Display settings">⚙</button>
    </div>
  </header>

  <nav id="body-list" class="panel desktop-only"></nav>
  <nav id="mobile-bodies" class="panel mobile-only hidden"></nav>
  <aside id="info-panel" class="panel hidden"></aside>
  <div id="settings-panel" class="panel hidden"></div>
  <div id="lab-panel" class="panel hidden desktop-only"></div>
  <aside id="equation-panel" class="panel hidden"></aside>
  <aside id="spm-panel" class="panel hidden"></aside>
  <aside id="earth-panel" class="panel hidden"></aside>
  <aside id="light-panel" class="panel hidden"></aside>
  <aside id="gravity-panel" class="panel hidden"></aside>
  <aside id="photo-panel" class="panel hidden"></aside>
  <aside id="fractal-panel" class="panel hidden"></aside>
  <footer id="timebar" class="panel"></footer>
  <footer id="math-timebar" class="panel hidden"></footer>
  <div id="help-overlay" class="overlay hidden"></div>
  <div id="trace-results" class="overlay hidden"></div>

  <div id="attribution" class="desktop-only">
    Ephemerides: JPL Keplerian elements · Textures: Solar System Scope (CC BY 4.0) · Press H for help
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
